name: "AISPA Audit"
description: "Audit AI system prompts against the AISPA (AI System Prompt Auditing) standard in your CI/CD pipeline"
author: "Xiangning Lin"

branding:
  icon: "shield"
  color: "blue"

inputs:
  prompts-dir:
    description: "Path to the directory containing system prompt files"
    required: true
    default: "./prompts"
  threshold:
    description: "Minimum compliance rate (0-100) to pass the audit"
    required: false
    default: "0"
  api-url:
    description: "Base URL of the AISPA auditing service"
    required: false
    default: "https://prompt-auditing-service.vercel.app"
  api-key:
    description: "API key for the AISPA service"
    required: false
  model:
    description: "LLM model to use for auditing"
    required: false
  output-format:
    description: "Output format: table or json"
    required: false
    default: "table"
  version:
    description: "Version of aispa-audit CLI to install"
    required: false
    default: "latest"

outputs:
  result:
    description: "JSON audit result"
    value: ${{ steps.audit.outputs.result }}
  status:
    description: "Overall status: PASSED or FAILED"
    value: ${{ steps.audit.outputs.status }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install aispa-audit
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "latest" ]; then
          pip install "aispa-audit @ git+https://github.com/XiangningLin/aispa-audit.git@main"
        else
          pip install "aispa-audit==${{ inputs.version }}"
        fi

    - name: Run AISPA audit
      id: audit
      shell: bash
      env:
        AISPA_API_URL: ${{ inputs.api-url }}
        AISPA_API_KEY: ${{ inputs.api-key }}
        AISPA_MODEL: ${{ inputs.model }}
      run: |
        set +e

        ARGS="${{ inputs.prompts-dir }}"
        ARGS="$ARGS --threshold ${{ inputs.threshold }}"
        ARGS="$ARGS --output ${{ inputs.output-format }}"

        if [ "${{ inputs.output-format }}" = "json" ]; then
          RESULT=$(aispa-audit $ARGS 2>&1)
          EXIT_CODE=$?
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          aispa-audit $ARGS
          EXIT_CODE=$?
        fi

        if [ $EXIT_CODE -eq 0 ]; then
          echo "status=PASSED" >> $GITHUB_OUTPUT
        else
          echo "status=FAILED" >> $GITHUB_OUTPUT
        fi

        exit $EXIT_CODE
