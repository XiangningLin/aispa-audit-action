name: "AISPA Audit"
description: "Audit AI system prompts against the AISPA (AI System Prompt Auditing) standard in your CI/CD pipeline"
author: "Xiangning Lin"

branding:
  icon: "shield"
  color: "blue"

inputs:
  prompts-dir:
    description: "Path to the directory containing system prompt files"
    required: true
    default: "./prompts"
  threshold:
    description: "Minimum compliance rate (0-100) to pass the audit"
    required: false
    default: "0"
  api-url:
    description: "Base URL of the AISPA auditing service"
    required: false
    default: "https://prompt-auditing-service.vercel.app"
  api-key:
    description: "API key for the AISPA service"
    required: false
  model:
    description: "LLM model to use for auditing"
    required: false
  comment-on-pr:
    description: "Post audit results as a PR comment (requires pull_request trigger)"
    required: false
    default: "true"
  version:
    description: "Version of aispa-audit CLI to install"
    required: false
    default: "latest"

outputs:
  status:
    description: "Overall status: PASSED or FAILED"
    value: ${{ steps.audit.outputs.status }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install aispa-audit
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "latest" ]; then
          pip install "aispa-audit @ git+https://github.com/XiangningLin/aispa-audit.git@main"
        else
          pip install "aispa-audit==${{ inputs.version }}"
        fi

    - name: Run AISPA audit
      id: audit
      shell: bash
      env:
        AISPA_API_URL: ${{ inputs.api-url }}
        AISPA_API_KEY: ${{ inputs.api-key }}
        AISPA_MODEL: ${{ inputs.model }}
      run: |
        set +e

        # Run with table output for logs
        aispa-audit ${{ inputs.prompts-dir }} --threshold ${{ inputs.threshold }} --output table
        EXIT_CODE=$?

        # Write markdown report to file (avoids shell/JS injection issues)
        aispa-audit ${{ inputs.prompts-dir }} --threshold ${{ inputs.threshold }} --output markdown > /tmp/aispa-report.md 2>&1 || true

        # Write JSON result to file
        aispa-audit ${{ inputs.prompts-dir }} --threshold ${{ inputs.threshold }} --output json > /tmp/aispa-result.json 2>&1 || true

        if [ $EXIT_CODE -eq 0 ]; then
          echo "status=PASSED" >> $GITHUB_OUTPUT
        else
          echo "status=FAILED" >> $GITHUB_OUTPUT
        fi

        exit $EXIT_CODE

    - name: Comment on PR
      if: always() && github.event_name == 'pull_request' && inputs.comment-on-pr == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- aispa-audit-report -->';
          let reportContent = '';
          try {
            reportContent = fs.readFileSync('/tmp/aispa-report.md', 'utf8').trim();
          } catch (e) {
            reportContent = '⚠️ AISPA audit report could not be generated. Check the workflow logs.';
          }
          const body = marker + '\n' + reportContent;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
          }
