name: "AISPA Audit"
description: "Audit AI system prompts against the AISPA (AI System Prompt Auditing) standard in your CI/CD pipeline"
author: "Xiangning Lin"

branding:
  icon: "shield"
  color: "blue"

inputs:
  prompts-dir:
    description: "Path to the directory containing system prompt files"
    required: true
    default: "./prompts"
  threshold:
    description: "Minimum compliance rate (0-100) to pass the audit"
    required: false
    default: "0"
  api-url:
    description: "Base URL of the AISPA auditing service"
    required: false
    default: "https://systempromptauditingbackend.vercel.app"
  api-key:
    description: "API key for the AISPA service"
    required: false
  model:
    description: "LLM model to use for auditing"
    required: false
  comment-on-pr:
    description: "Post audit results as a PR comment (requires pull_request trigger)"
    required: false
    default: "true"

outputs:
  status:
    description: "Overall status: PASSED or FAILED"
    value: ${{ steps.audit.outputs.status }}

runs:
  using: "composite"
  steps:
    - name: Run AISPA audit
      id: audit
      shell: bash
      env:
        AISPA_API_URL: ${{ inputs.api-url }}
        AISPA_API_KEY: ${{ inputs.api-key }}
        AISPA_MODEL: ${{ inputs.model }}
        PROMPTS_DIR: ${{ inputs.prompts-dir }}
        THRESHOLD: ${{ inputs.threshold }}
      run: |
        python3 << 'PYTHON_SCRIPT'
        import os, json, sys, urllib.request, urllib.error
        from pathlib import Path

        api_url = os.environ.get("AISPA_API_URL", "https://systempromptauditingbackend.vercel.app")
        api_key = os.environ.get("AISPA_API_KEY", "")
        model = os.environ.get("AISPA_MODEL", "")
        prompts_dir = os.environ.get("PROMPTS_DIR", "./prompts")
        threshold = int(os.environ.get("THRESHOLD", "0"))

        EXTENSIONS = {".txt", ".md", ".prompt", ".system"}

        # Discover prompt files
        root = Path(prompts_dir)
        if not root.is_dir():
            print(f"::error::Directory not found: {prompts_dir}")
            with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                f.write("status=FAILED\n")
            sys.exit(1)

        files = sorted(p for p in root.rglob("*") if p.is_file() and p.suffix.lower() in EXTENSIONS)
        if not files:
            print(f"::error::No prompt files found in {prompts_dir}")
            with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                f.write("status=FAILED\n")
            sys.exit(1)

        print(f"\nAISPA Audit — scanning {prompts_dir}")
        print("=" * 60)

        results = []
        passed = 0
        failed = 0
        errors = 0

        for filepath in files:
            content = filepath.read_text(encoding="utf-8").strip()
            if not content:
                errors += 1
                results.append({"path": str(filepath), "status": "ERROR", "error": "Empty file"})
                print(f"  ⚠️  {filepath} — ERROR (empty file)")
                continue

            # Call AISPA API
            payload = {"prompt": content, "consent": True}
            if model:
                payload["model"] = model

            headers = {"Content-Type": "application/json"}
            if api_key:
                headers["Authorization"] = f"Bearer {api_key}"

            req = urllib.request.Request(
                f"{api_url}/api/audit",
                data=json.dumps(payload).encode(),
                headers=headers,
                method="POST",
            )

            try:
                with urllib.request.urlopen(req, timeout=120) as resp:
                    data = json.loads(resp.read().decode())
            except (urllib.error.URLError, urllib.error.HTTPError) as e:
                errors += 1
                err_msg = str(e)
                results.append({"path": str(filepath), "status": "ERROR", "error": err_msg})
                print(f"  ⚠️  {filepath} — ERROR ({err_msg})")
                continue

            compliance_rate = data.get("compliance_rate", 0)
            status = data.get("overall_status", "FAIL")
            if threshold and compliance_rate < threshold:
                status = "FAIL"

            if status == "PASS":
                passed += 1
                print(f"  ✅ {filepath} — PASS (compliance: {compliance_rate}%, score: {data.get('overall_score', 0)})")
            else:
                failed += 1
                print(f"  ❌ {filepath} — FAIL (compliance: {compliance_rate}%, score: {data.get('overall_score', 0)})")
                for issue in data.get("critical_issues", []):
                    print(f"       • {issue}")

            results.append({
                "path": str(filepath),
                "status": status,
                "compliance_rate": compliance_rate,
                "overall_score": data.get("overall_score", 0),
                "dimensions": data.get("dimensions", []),
                "critical_issues": data.get("critical_issues", []),
                "recommendations": data.get("recommendations", []),
            })

        total = len(files)
        overall_pass = failed == 0 and errors == 0

        print(f"\n{'=' * 60}")
        print(f"Summary: {total} prompt(s) scanned, {passed} passed, {failed} failed, {errors} error(s)")
        print(f"\n{'✅ PASSED' if overall_pass else '❌ FAILED'}\n")

        # Generate markdown report
        icon = "✅" if overall_pass else "❌"
        md = []
        md.append(f"## {icon} AISPA Audit Report\n")
        md.append(f"**{total}** prompt(s) scanned — **{passed}** passed, **{failed}** failed, **{errors}** error(s)\n")

        for r in results:
            if r["status"] == "ERROR":
                md.append(f"### ⚠️ `{r['path']}`\n")
                md.append(f"> **Error:** {r['error']}\n")
                continue

            file_icon = "✅" if r["status"] == "PASS" else "❌"
            md.append(f"### {file_icon} `{r['path']}`\n")
            md.append(f"**Status:** {r['status']} | **Compliance:** {r['compliance_rate']}% | **Score:** {r['overall_score']}\n")

            # Dimensions table
            dims = r.get("dimensions", [])
            if dims:
                md.append("| Dimension | Score | Explanation |")
                md.append("|-----------|:-----:|-------------|")
                for d in dims:
                    score = d.get("score", 0)
                    emoji = "✅" if score > 0 else ("❌" if score < 0 else "➖")
                    dim_id = d.get("id", "")
                    name = d.get("name", "")
                    explanation = d.get("explanation", "")
                    evidence = d.get("evidence", "")
                    if evidence:
                        explanation = f'{explanation} *"{evidence}"*'
                    md.append(f"| {dim_id}: {name} | {emoji} {score:+d} | {explanation} |")
                md.append("")

            # Critical issues
            issues = r.get("critical_issues", [])
            if issues:
                md.append("**⚠️ Critical Issues:**\n")
                for issue in issues:
                    md.append(f"- {issue}")
                md.append("")

            # Recommendations
            recs = r.get("recommendations", [])
            if recs:
                md.append("<details><summary>💡 Recommendations</summary>\n")
                for rec in recs:
                    md.append(f"- {rec}")
                md.append("\n</details>\n")

        md.append("---")
        md.append("*Audited by [AISPA](https://github.com/XiangningLin/aispa-audit-action) — AI System Prompt Auditing Standard.*")

        report_content = "\n".join(md)

        # Write report to file
        with open("/tmp/aispa-report.md", "w") as f:
            f.write(report_content)

        # Write status to GITHUB_OUTPUT
        with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"status={'PASSED' if overall_pass else 'FAILED'}\n")

        sys.exit(0 if overall_pass else 1)
        PYTHON_SCRIPT

    - name: Comment on PR
      if: always() && github.event_name == 'pull_request' && inputs.comment-on-pr == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- aispa-audit-report -->';
          let reportContent = '';
          try {
            reportContent = fs.readFileSync('/tmp/aispa-report.md', 'utf8').trim();
          } catch (e) {
            reportContent = '⚠️ AISPA audit report could not be generated. Check the workflow logs.';
          }
          const body = marker + '\n' + reportContent;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
          }
