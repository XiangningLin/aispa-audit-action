name: "AISPA Audit"
description: "Audit AI system prompts against the AISPA (AI System Prompt Auditing) standard in your CI/CD pipeline"
author: "Xiangning Lin"

branding:
  icon: "shield"
  color: "blue"

inputs:
  prompts-dir:
    description: "Path to the directory containing system prompt files"
    required: true
    default: "./prompts"
  threshold:
    description: "Minimum compliance rate (0-100) to pass the audit"
    required: false
    default: "0"
  api-url:
    description: "Base URL of the AISPA auditing service"
    required: false
    default: "https://systempromptauditingbackend.vercel.app"
  api-key:
    description: "API key for the AISPA service"
    required: false
  model:
    description: "LLM model to use for auditing"
    required: false
  comment-on-pr:
    description: "Post audit results as a PR comment (requires pull_request trigger)"
    required: false
    default: "true"

outputs:
  status:
    description: "Overall status: PASSED or FAILED"
    value: ${{ steps.audit.outputs.status }}

runs:
  using: "composite"
  steps:
    - name: Run AISPA audit
      id: audit
      shell: bash
      env:
        AISPA_API_URL: ${{ inputs.api-url }}
        AISPA_API_KEY: ${{ inputs.api-key }}
        AISPA_MODEL: ${{ inputs.model }}
        PROMPTS_DIR: ${{ inputs.prompts-dir }}
        THRESHOLD: ${{ inputs.threshold }}
      run: |
        set +e

        PASSED=0
        FAILED=0
        ERRORS=0
        TOTAL=0
        REPORT_MD=""
        TABLE_OUTPUT=""

        # Find all prompt files
        FILES=$(find "$PROMPTS_DIR" -type f \( -name "*.txt" -o -name "*.md" -o -name "*.prompt" -o -name "*.system" \) | sort)

        if [ -z "$FILES" ]; then
          echo "::error::No prompt files found in $PROMPTS_DIR"
          echo "status=FAILED" >> $GITHUB_OUTPUT
          exit 1
        fi

        echo "AISPA Audit - scanning $PROMPTS_DIR"
        echo "========================================="

        for FILE in $FILES; do
          TOTAL=$((TOTAL + 1))
          CONTENT=$(cat "$FILE")

          if [ -z "$CONTENT" ]; then
            ERRORS=$((ERRORS + 1))
            echo "[$FILE] ERROR: empty file"
            continue
          fi

          # Build JSON payload
          PAYLOAD=$(python3 -c "
        import json, sys
        content = sys.stdin.read()
        payload = {'prompt': content, 'consent': True}
        model = '$AISPA_MODEL'
        if model:
            payload['model'] = model
        print(json.dumps(payload))
        " <<< "$CONTENT")

          # Call AISPA API
          HEADERS=(-H "Content-Type: application/json")
          if [ -n "$AISPA_API_KEY" ]; then
            HEADERS+=(-H "Authorization: Bearer $AISPA_API_KEY")
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 120 \
            "${HEADERS[@]}" \
            -X POST "$AISPA_API_URL/api/audit" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            ERRORS=$((ERRORS + 1))
            echo "[$FILE] ERROR: API returned $HTTP_CODE"
            TABLE_OUTPUT="$TABLE_OUTPUT\n| $FILE | ERROR | - | - | API error ($HTTP_CODE) |"
            REPORT_MD="$REPORT_MD\n### ⚠️ \`$FILE\`\n> **Error:** API returned HTTP $HTTP_CODE\n"
            continue
          fi

          # Parse response
          RESULT=$(python3 -c "
        import json, sys
        data = json.loads(sys.stdin.read())
        status = data.get('overall_status', 'FAIL')
        rate = data.get('compliance_rate', 0)
        score = data.get('overall_score', 0)
        issues = data.get('critical_issues', [])
        dims = data.get('dimensions', [])

        threshold = int('$THRESHOLD')
        if threshold and rate < threshold:
            status = 'FAIL'

        print(f'{status}|{rate}|{score}')
        print('---ISSUES---')
        for i in issues:
            print(i)
        print('---DIMS---')
        for d in dims:
            sid = d.get('id','')
            name = d.get('name','')
            s = d.get('score',0)
            exp = d.get('explanation','')
            print(f'{sid}|{name}|{s}|{exp}')
        " <<< "$BODY")

          STATUS=$(echo "$RESULT" | head -1 | cut -d'|' -f1)
          RATE=$(echo "$RESULT" | head -1 | cut -d'|' -f2)
          SCORE=$(echo "$RESULT" | head -1 | cut -d'|' -f3)
          ISSUES=$(echo "$RESULT" | sed -n '/---ISSUES---/,/---DIMS---/p' | grep -v "^---")
          DIMS=$(echo "$RESULT" | sed -n '/---DIMS---/,$ p' | grep -v "^---")

          if [ "$STATUS" = "PASS" ]; then
            PASSED=$((PASSED + 1))
            echo "✅ [$FILE] PASS (compliance: ${RATE}%, score: $SCORE)"
          else
            FAILED=$((FAILED + 1))
            echo "❌ [$FILE] FAIL (compliance: ${RATE}%, score: $SCORE)"
            if [ -n "$ISSUES" ]; then
              echo "$ISSUES" | while read -r issue; do
                echo "   - $issue"
              done
            fi
          fi

          # Build markdown report
          if [ "$STATUS" = "PASS" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi
          REPORT_MD="$REPORT_MD\n### $ICON \`$FILE\`\n"
          REPORT_MD="$REPORT_MD\n**Status:** $STATUS | **Compliance:** ${RATE}% | **Score:** $SCORE\n"

          if [ -n "$DIMS" ]; then
            REPORT_MD="$REPORT_MD\n| Dimension | Score | Explanation |"
            REPORT_MD="$REPORT_MD\n|-----------|:-----:|-------------|"
            echo "$DIMS" | while IFS='|' read -r did dname dscore dexp; do
              if [ "$dscore" -gt 0 ] 2>/dev/null; then
                demoji="✅"
              elif [ "$dscore" -lt 0 ] 2>/dev/null; then
                demoji="❌"
              else
                demoji="➖"
              fi
              REPORT_MD="$REPORT_MD\n| $did: $dname | $demoji $dscore | $dexp |"
            done
            REPORT_MD="$REPORT_MD\n"
          fi

          if [ -n "$ISSUES" ]; then
            REPORT_MD="$REPORT_MD\n**Critical Issues:**"
            echo "$ISSUES" | while read -r issue; do
              REPORT_MD="$REPORT_MD\n- $issue"
            done
            REPORT_MD="$REPORT_MD\n"
          fi
        done

        echo ""
        echo "========================================="
        echo "Summary: $TOTAL prompt(s) scanned, $PASSED passed, $FAILED failed, $ERRORS error(s)"

        # Write markdown report
        HEADER="## AISPA Audit Report\n\n**${TOTAL}** prompt(s) scanned — **${PASSED}** passed, **${FAILED}** failed, **${ERRORS}** error(s)\n"
        echo -e "$HEADER$REPORT_MD\n---\n*Audited by [AISPA](https://systempromptauditingbackend.vercel.app) — AI System Prompt Auditing.*" > /tmp/aispa-report.md

        if [ $FAILED -eq 0 ] && [ $ERRORS -eq 0 ]; then
          echo "status=PASSED" >> $GITHUB_OUTPUT
          echo ""
          echo "✅ PASSED"
          exit 0
        else
          echo "status=FAILED" >> $GITHUB_OUTPUT
          echo ""
          echo "❌ FAILED"
          exit 1
        fi

    - name: Comment on PR
      if: always() && github.event_name == 'pull_request' && inputs.comment-on-pr == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- aispa-audit-report -->';
          let reportContent = '';
          try {
            reportContent = fs.readFileSync('/tmp/aispa-report.md', 'utf8').trim();
          } catch (e) {
            reportContent = '⚠️ AISPA audit report could not be generated. Check the workflow logs.';
          }
          const body = marker + '\n' + reportContent;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
          }
